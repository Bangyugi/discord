version: '3.8'

services:
  chronos_bot:
    build: .
    container_name: chronos_bot
    restart: always
    env_file:
      - .env
    environment:
      # Ghi đè DATABASE_URL để đưa file database SQLite vào thư mục /app/data (nơi được mount volume)
      - DATABASE_URL=sqlite+aiosqlite:///data/chronos_discipline.db
    volumes:
      - bot_data:/app/data

volumes:
  bot_data:
    driver: local
